<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finds</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/style.css">
    <link rel="alternate" type="application/atom+xml" title="Finds Feed" href="feed.xml">
</head>
<body>
    <header>
        <h1>Finds</h1>
        <button id="theme-toggle" type="button" aria-label="Toggle dark mode">
            <span class="icon-sun">&#9728;</span>
            <span class="icon-moon">&#9790;</span>
        </button>
    </header>

    <div class="controls">
        <div class="search-bar">
            <input type="text" id="search" placeholder="Search finds..." aria-label="Search finds">
            <button id="clear-filters" type="button">Clear</button>
        </div>
        <div class="tag-bar" id="tag-bar">
            {% for tag in tags %}
            <button class="tag-pill" data-tag="{{ tag }}" type="button">{{ tag }}</button>
            {% endfor %}
        </div>
        <p class="entry-count" id="entry-count"></p>
    </div>

    <nav class="pagination" id="pagination-top"></nav>

    <main class="card-grid" id="card-grid">
        {% for entry in entries %}
        <article class="card"
                 data-title="{{ entry.title | lower }}"
                 data-description="{{ entry.description | lower }}"
                 data-tags="{{ entry.tags | join(' ') | lower }}">
            <h2><a href="{{ entry.url }}" target="_blank" rel="noopener noreferrer">{{ entry.title }}</a></h2>
            <p class="description">{{ entry.description }}</p>
            <time datetime="{{ entry.date }}">{{ entry.date.strftime('%b %-d, %Y') }}</time>
            <div class="tags">
                {% for tag in entry.tags %}
                <button class="tag-pill card-tag" data-tag="{{ tag }}" type="button">{{ tag }}</button>
                {% endfor %}
            </div>
        </article>
        {% endfor %}
    </main>

    <nav class="pagination" id="pagination-bottom"></nav>

    <footer>
        <a href="feed.xml">RSS Feed</a>
    </footer>

    <script src="static/app.js"></script>
</body>
</html>
